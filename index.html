  <script>
// ==================== PWA SETUP ====================
let deferredPrompt=null;
const pwaInstallPrompt=document.getElementById('pwa-install-prompt');

// Listen for beforeinstallprompt event
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  deferredPrompt=e;
  
  // Show install prompt after 2 seconds on first load
  setTimeout(()=>{
    if(!localStorage.getItem('pwaPromptDismissed')){
      pwaInstallPrompt.style.display='flex';
    }
  },2000);
});

function installPWA(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(choiceResult=>{
      if(choiceResult.outcome==='accepted'){
        toast('✓ Aplikasi berhasil diinstall! Buka dari launcher HP Anda');
        addLog('Guru menginstall PWA');
        localStorage.setItem('pwaPromptDismissed','true');
      }
      closePWAPrompt();
    });
  }
}

function closePWAPrompt(){
  pwaInstallPrompt.style.display='none';
  localStorage.setItem('pwaPromptDismissed','true');
}

// Handle app installed event
window.addEventListener('appinstalled',()=>{
  toast('📱 Aplikasi Absensi berhasil diinstall di HP Anda!');
  console.log('PWA installed successfully');
});

// Register Service Worker for offline support
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('data:application/javascript,'+encodeURIComponent(`
const CACHE_NAME='absensi-app-v1';
const urlsToCache=['/'];

// Install event
self.addEventListener('install',event=>{
  event.waitUntil(caches.open(CACHE_NAME).then(cache=>{
    console.log('Service Worker: Caching app shell');
  }).catch(err=>console.log('Cache error:',err)));
  self.skipWaiting();
});

// Activate event
self.addEventListener('activate',event=>{
  event.waitUntil(clients.claim());
});

// Fetch event - Network first, fallback to cache
self.addEventListener('fetch',event=>{
  // Skip non-GET requests
  if(event.request.method!=='GET')return;
  
  event.respondWith(
    fetch(event.request)
      .then(response=>{
        // Cache successful responses
        if(response&&response.status===200){
          const responseClone=response.clone();
          caches.open(CACHE_NAME).then(cache=>{
            cache.put(event.request,responseClone);
          });
        }
        return response;
      })
      .catch(()=>{
        // Return cached version on network error
        return caches.match(event.request)
          .then(response=>response||new Response('Offline mode - data unavailable'));
      })
  );
});

// Handle push notifications
self.addEventListener('push',event=>{
  if(!event.data)return;
  
  const data=event.data.json();
  const options={
    body:data.body||'Notifikasi Absensi',
    icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect fill="%232a8fff" width="192" height="192"/><text x="50%" y="50%" font-size="100" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle" font-family="Arial">A</text></svg>',
    badge:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96"><rect fill="%232a8fff" width="96" height="96"/><text x="50%" y="50%" font-size="50" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle" font-family="Arial">A</text></svg>',
    tag:'absensi-notification',
    requireInteraction:true
  };
  
  event.waitUntil(self.registration.showNotification('Absensi SD Babakan',options));
});

// Handle notification clicks
self.addEventListener('notificationclick',event=>{
  event.notification.close();
  event.waitUntil(
    clients.matchAll({type:'window'}).then(clientList=>{
      for(let i=0;i<clientList.length;i++){
        if(clientList[i].url==='/'&&'focus' in clientList[i]){
          return clientList[i].focus();
        }
      }
      if(clients.openWindow){
        return clients.openWindow('/');
      }
    })
  );
});
`)).then(reg=>{
      console.log('✓ Service Worker registered for offline support');
    }).catch(err=>{
      console.log('Service Worker registration error:',err);
    });
  });
}

// Detect when online/offline
window.addEventListener('online',()=>{
  toast('🟢 Kembali online - Data dapat disinkronkan');
});

window.addEventListener('offline',()=>{
  toast('🔴 Offline - Aplikasi bekerja dengan data lokal','error');
});

// Show initial offline status if needed
if(!navigator.onLine){
  setTimeout(()=>toast('🔴 Anda sedang offline - Aplikasi bekerja dengan data lokal','error'),500);
}

  warningTimeout: 55*60*1000, // 55 minutes (5 min before logout)

// seed some students

  const names = ['Ahmad Fauzi','Siti Aisyah','Budi Santoso','Dewi Lestari','Rizky Pratama','Nur Halimah','Dimas Arya','Putri Wulandari','Fajar Ramadhan','Anisa Rahma','Eko Prasetyo','Maya Sari','Rendi Gunawan','Lina Marlina','Yusuf Hakim','Nadia Safitri','Andi Firmansyah','Tania Putri','Galih Setiawan','Rina Agustina'];
  names.forEach((n,i) => {
    APP.students[c].push({id:`${c}-${i}`,name:n,nis:`2024${c.replace(/\D/g,'')}${String(i+1).padStart(3,'0')}`});
  });
});

// seed teachers
APP.teachers = [
  {id:'t1',name:'Ibu Sari Dewi',username:'sari',password:'1234',type:'guru_kelas',kelas:'1A'},
  {id:'t2',name:'Bapak Ahmad',username:'ahmad',password:'1234',type:'guru_kelas',kelas:'2A'},
  {id:'t3',name:'Ibu Rina',username:'rina',password:'1234',type:'guru_mapel',mapel:'Matematika'},
  {id:'t4',name:'Bapak Dedi',username:'dedi',password:'1234',type:'guru_mapel',mapel:'IPA'},
  {id:'t5',name:'Admin Sekolah',username:'admin',password:'admin',type:'admin'},
];

function getToday(){return new Date().toISOString().split('T')[0]}
function getAttKey(cls,date,studentId){return `${cls}-${date}-${studentId}`}
function toast(msg,type='success'){
  const t=document.createElement('div');
  t.className=`toast ${type==='success'?'bg-emerald-500':'bg-red-500'}`;
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}
function addLog(action){
  APP.activityLog.unshift({time:new Date().toLocaleString('id-ID'),user:APP.currentUser?.name||'System',action});
}

// ==================== SESSION TIMEOUT ====================
function initSessionTimeout(){
  clearSessionTimers();
  APP.lastActivityTime=Date.now();
  APP.sessionWarningShown=false;
  
  // Set warning timer for 55 minutes
  APP.sessionWarningTimer=setTimeout(()=>{
    if(APP.currentPage==='dashboard')showSessionWarning();
  },APP.warningTimeout);
  
  // Set logout timer for 60 minutes
  APP.sessionTimeoutTimer=setTimeout(()=>{
    if(APP.currentPage==='dashboard')forceLogout('Session timeout');
  },APP.sessionTimeout);
}

function clearSessionTimers(){
  if(APP.sessionTimeoutTimer)clearTimeout(APP.sessionTimeoutTimer);
  if(APP.sessionWarningTimer)clearTimeout(APP.sessionWarningTimer);
}

function updateSessionActivity(){
  if(APP.currentPage!=='dashboard')return;
  const now=Date.now();
  const timeSinceLastActivity=now-APP.lastActivityTime;
  
  // If activity detected after warning, hide warning
  if(APP.sessionWarningShown && timeSinceLastActivity<APP.warningTimeout){
    const warningEl=document.getElementById('session-warning');
    if(warningEl)warningEl.remove();
    APP.sessionWarningShown=false;
  }
  
  // Reset timers on activity
  if(timeSinceLastActivity>1000){
    APP.lastActivityTime=now;
    clearSessionTimers();
    initSessionTimeout();
  }
}

function showSessionWarning(){
  if(APP.sessionWarningShown || APP.currentPage!=='dashboard')return;
  APP.sessionWarningShown=true;
  
  const warning=document.createElement('div');
  warning.id='session-warning';
  warning.className='modal-overlay';
  warning.style.cssText='display:flex;z-index:10000';
  warning.innerHTML=`
    <div class="modal-content" style="max-width:450px;background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #f59e0b">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
        <div style="width:56px;height:56px;border-radius:50%;background:#f59e0b;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <i data-lucide="alert-triangle" style="width:28px;height:28px;color:#fff"></i>
        </div>
        <div>
          <h3 style="font-weight:700;font-size:18px;color:#92400e">Perhatian!</h3>
          <p style="font-size:12px;color:#b45309;margin-top:2px">Sesi Anda akan berakhir dalam 5 menit</p>
        </div>
      </div>
      
      <div style="background:rgba(255,255,255,.6);padding:12px;border-radius:8px;margin-bottom:16px;border-left:4px solid #f59e0b">
        <p style="font-size:13px;color:#92400e;margin:0;line-height:1.5">
          Anda tidak melakukan aktivitas selama 55 menit. Untuk keamanan data sekolah, sesi Anda akan ditutup otomatis.
        </p>
        <p style="font-size:12px;color:#b45309;margin:8px 0 0 0">
          💡 Lanjutkan bekerja atau logout sekarang?
        </p>
      </div>
      
      <div style="background:#fff;padding:12px;border-radius:8px;margin-bottom:16px;font-size:11px;color:var(--text2);text-align:center">
        <p style="margin:0;font-weight:600">Waktu tersisa: <span id="countdown-timer" style="color:#f59e0b;font-weight:800">5:00</span></p>
      </div>
      
      <div class="flex gap-3 justify-end">
        <button class="btn btn-secondary" onclick="logoutNow()"><i data-lucide="log-out" style="width:16px;height:16px"></i> Logout Sekarang</button>
        <button class="btn btn-success" onclick="extendSession()"><i data-lucide="refresh-cw" style="width:16px;height:16px"></i> Lanjutkan Bekerja</button>
      </div>
    </div>`;
  
  document.body.appendChild(warning);
  lucide.createIcons();
  
  // Countdown timer
  let timeLeft=300; // 5 minutes in seconds
  const countdownInterval=setInterval(()=>{
    timeLeft--;
    const mins=Math.floor(timeLeft/60);
    const secs=timeLeft%60;
    const timerEl=document.getElementById('countdown-timer');
    if(timerEl)timerEl.textContent=`${mins}:${String(secs).padStart(2,'0')}`;
    
    if(timeLeft<=0){
      clearInterval(countdownInterval);
      forceLogout('Session timeout');
    }
  },1000);
  
  // Store interval so we can clear it
  window.sessionCountdownInterval=countdownInterval;
}

function extendSession(){
  const warning=document.getElementById('session-warning');
  if(warning)warning.remove();
  if(window.sessionCountdownInterval)clearInterval(window.sessionCountdownInterval);
  APP.sessionWarningShown=false;
  APP.lastActivityTime=Date.now();
  initSessionTimeout();
  toast('Sesi diperpanjang. Anda memiliki 60 menit lagi.');
}

function logoutNow(){
  const warning=document.getElementById('session-warning');
  if(warning)warning.remove();
  if(window.sessionCountdownInterval)clearInterval(window.sessionCountdownInterval);
  logout();
}

function forceLogout(reason='Session timeout'){
  const warning=document.getElementById('session-warning');
  if(warning)warning.remove();
  if(window.sessionCountdownInterval)clearInterval(window.sessionCountdownInterval);
  clearSessionTimers();
  addLog(`${APP.currentUser?.name||'User'} logout (${reason})`);
  APP.currentPage='login';
  APP.currentUser=null;
  APP.userType=null;
  APP.selfieDone=false;
  APP.sessionWarningShown=false;
  render();
  toast(`Sesi berakhir: ${reason}. Silakan login kembali.`,'error');
}

function showProgress(){
  const pb=document.getElementById('progress-bar');
  pb.classList.add('active');
  pb.classList.remove('complete');
}

function hideProgress(){
  const pb=document.getElementById('progress-bar');
  pb.classList.add('complete');
  setTimeout(()=>{
    pb.classList.remove('active','complete');
  },400);
}

function doLogin(type){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value.trim();
  const err=document.getElementById('login-error');
  if(!u||!p){err.style.display='block';err.textContent='Username dan password harus diisi!';return}
  const teacher=APP.teachers.find(t=>t.username===u&&t.password===p&&t.type===type);
  if(!teacher){err.style.display='block';err.textContent='Username/password salah atau tipe login tidak sesuai!';return}
  APP.currentUser=teacher;APP.userType=type;APP.currentPage='dashboard';APP.currentView='dashboard';APP.selfieDone=false;
  addLog(`${teacher.name} login sebagai ${type}`);
  initSessionTimeout();
  render();
}

function renderDashboardView(el){
  const cls = APP.userType==='guru_kelas'?APP.currentUser.kelas:APP.selectedClass;
  const students = APP.students[cls]||[];
  const today=getToday();
  let h=0,a=0,s=0,iz=0;
  students.forEach(st=>{
    const k=getAttKey(cls,today,st.id);
    const v=APP.attendance[k];
    if(v==='hadir')h++;else if(v==='alfa')a++;else if(v==='sakit')s++;else if(v==='izin')iz++;
  });
  const total=students.length;const done=h+a+s+iz;
  const pct=total?Math.round(h/total*100):0;

  // Calculate class ranking for admin
  let classRanking=[];
  if(APP.userType==='admin'){
    APP.classes.forEach(c=>{
      const classStudents=APP.students[c]||[];
      let classHadir=0;
      classStudents.forEach(st=>{
        const k=getAttKey(c,today,st.id);
        if(APP.attendance[k]==='hadir')classHadir++;
      });
      const classPct=classStudents.length?Math.round(classHadir/classStudents.length*100):0;
      classRanking.push({kelas:c,hadir:classHadir,total:classStudents.length,pct:classPct});
    });

let cameraStream=null;
function startCamera(){
  const video=document.getElementById('selfie-video');
  const ph=document.getElementById('selfie-placeholder');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}}).then(stream=>{
    cameraStream=stream;video.srcObject=stream;video.style.display='block';
    if(ph)ph.style.display='none';
    document.getElementById('btn-start-cam').style.display='none';
    document.getElementById('btn-capture').style.display='inline-flex';
  }).catch(()=>{
    toast('Kamera tidak tersedia. Melanjutkan tanpa selfie.','error');
    APP.selfieDone=true;APP.selfieData={lat:null,lng:null,time:new Date()};
    addLog(`${APP.currentUser.name} skip selfie (kamera tidak tersedia)`);
    renderView();
  });
}

function capturePhoto(){
  const video=document.getElementById('selfie-video');
  const canvas=document.getElementById('selfie-canvas');
  canvas.width=video.videoWidth;canvas.height=video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);
  if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null}
  // Get geolocation
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      APP.selfieData={lat:pos.coords.latitude,lng:pos.coords.longitude,time:new Date()};
      finishSelfie();
    },()=>{APP.selfieData={lat:null,lng:null,time:new Date()};finishSelfie()});
  } else {APP.selfieData={lat:null,lng:null,time:new Date()};finishSelfie();}
}

function finishSelfie(){
  APP.selfieDone=true;
  addLog(`${APP.currentUser.name} mengambil selfie absen`);
  toast('Selfie berhasil diambil!');
  renderView();
}

function startQRScanner(){
  const scanner=document.getElementById('qr-scanner');
  const placeholder=document.getElementById('qr-placeholder');
  const video=document.createElement('video');
  video.setAttribute('playsinline','true');
  video.setAttribute('autoplay','true');
  scanner.innerHTML='';scanner.appendChild(video);

  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(stream=>{
    qrVideoStream=stream;
    video.srcObject=stream;
    scanner.style.display='block';
    placeholder.style.display='none';
    document.getElementById('btn-start-qr').style.display='none';
    document.getElementById('btn-stop-qr').style.display='inline-flex';
    
    const canvas=document.createElement('canvas');
    const ctx=canvas.getContext('2d');
    
    function scanQR(){
      if(!qrVideoStream||!video.readyState)return requestAnimationFrame(scanQR);
      
      canvas.width=video.videoWidth;canvas.height=video.videoHeight;
      ctx.drawImage(video,0,0,canvas.width,canvas.height);
      
      const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
      const code=jsQR(imageData.data,imageData.width,imageData.height);
      
      if(code){
        console.log('QR detected:',code.data);
        processQRCode(code.data);
        stopQRScanner();
      }else{
        requestAnimationFrame(scanQR);
      }
    }
    scanQR();
  }).catch(()=>{
    toast('Kamera tidak tersedia','error');
  });
}

function stopQRScanner(){
  if(qrVideoStream){qrVideoStream.getTracks().forEach(t=>t.stop());qrVideoStream=null}
  document.getElementById('qr-scanner').style.display='none';
  document.getElementById('qr-placeholder').style.display='flex';
  document.getElementById('btn-start-qr').style.display='inline-flex';
  document.getElementById('btn-stop-qr').style.display='none';
}

function manualQRInput(){
  document.getElementById('manual-qr-modal').style.display='flex';
}

function processQRCode(qrData){
  if(!qrData)return;
  
  // QR format: siswa_id@kelas@nama@nis
  const parts=qrData.split('@');
  if(parts.length<2){toast('Format QR Code tidak valid','error');return}
  
  const studentId=parts[0];
  const cls=parts[1]||APP.selectedClass;
  const students=APP.students[cls]||[];
  const student=students.find(s=>s.id===studentId||s.nis===studentId);
  
  if(!student){toast('Siswa tidak ditemukan','error');return}
  
  const today=getToday();
  const k=getAttKey(cls,today,student.id);
  APP.attendance[k]='hadir';
  
  const result=document.getElementById('qr-result');
  document.getElementById('qr-name').textContent=student.name;
  document.getElementById('qr-status').textContent=`✓ Absen berhasil! NIS: ${student.nis}`;
  result.style.display='block';
  result.style.background='#d1fae5';result.style.borderColor='#10b981';
  
  addLog(`${APP.currentUser.name} scan QR ${student.name} (kelas ${cls})`);
  toast(`${student.name} absen hadir!`);
  
  document.getElementById('manual-qr-modal').style.display='none';
  document.getElementById('manual-qr-input').value='';
  
  setTimeout(()=>{result.style.display='none';renderView()},1500);
}

function setAtt(cls,studentId,status){
  const k=getAttKey(cls,getToday(),studentId);
  APP.attendance[k]=APP.attendance[k]===status?'':status;
  addLog(`${APP.currentUser.name} mencatat ${status||'reset'} untuk siswa di kelas ${cls}`);
  
  // Update counter live without full re-render
  updateAttendanceCounters(cls);
}

function setAllAttendance(cls,status){
  showProgress();
  setTimeout(()=>{
    const students=APP.students[cls]||[];
    const today=getToday();
    students.forEach(st=>{APP.attendance[getAttKey(cls,today,st.id)]=status});
    if(status)addLog(`${APP.currentUser.name} set semua ${status} untuk kelas ${cls}`);
    toast(status?'Semua siswa ditandai '+status:'Status direset');
    hideProgress();
    updateAttendanceCounters(cls);
  },800);
}

// ==================== LIVE COUNTER UPDATE ====================
function updateAttendanceCounters(cls){
  const today=getToday();
  const students=APP.students[cls]||[];
  let h=0,a=0,s=0,iz=0;
  
  students.forEach(st=>{
    const k=getAttKey(cls,today,st.id);
    const v=APP.attendance[k];
    if(v==='hadir')h++;
    else if(v==='alfa')a++;
    else if(v==='sakit')s++;
    else if(v==='izin')iz++;
  });
  
  const total=students.length;
  const done=h+a+s+iz;
  const pct=total?Math.round(done/total*100):0;
  
  // Update counter elements if they exist
  const hairEl=document.getElementById('counter-hadir');
  const alfEl=document.getElementById('counter-alfa');
  const sakitEl=document.getElementById('counter-sakit');
  const izinEl=document.getElementById('counter-izin');
  const pctEl=document.getElementById('counter-pct');
  
  if(hairEl)hairEl.textContent=h;
  if(alfEl)alfEl.textContent=a;
  if(sakitEl)sakitEl.textContent=s;
  if(izinEl)izinEl.textContent=iz;
  if(pctEl)pctEl.textContent=pct+'%';
}

function renderPieChart(h,a,s,iz,total){
  if(!total)return '<p style="color:var(--text2)">Belum ada data</p>';
  const data=[{v:h,c:'#10b981',l:'Hadir'},{v:a,c:'#ef4444',l:'Alfa'},{v:s,c:'#f59e0b',l:'Sakit'},{v:iz,c:'#3b82f6',l:'Izin'}];
  let cum=0;
  const segments=data.filter(d=>d.v>0).map(d=>{
    const pct=d.v/total*100;const start=cum;cum+=pct;
    return {start,pct,color:d.c,label:d.l,val:d.v};
  });
  // simple CSS conic gradient
  const gradParts=[];let offset=0;
  segments.forEach(s=>{gradParts.push(`${s.color} ${offset}% ${offset+s.pct}%`);offset+=s.pct;});
  if(offset<100)gradParts.push(`var(--bg3) ${offset}% 100%`);
  return `<div style="position:relative"><div style="width:140px;height:140px;border-radius:50%;background:conic-gradient(${gradParts.join(',')})"></div>
    <div style="position:absolute;inset:25px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-direction:column">
      <span style="font-size:20px;font-weight:800">${total?Math.round(h/total*100):0}%</span><span style="font-size:9px;color:var(--text2)">Hadir</span>
    </div></div>`;
}

function handleImport(event){
  const file=event.target.files[0];if(!file)return;
  const cls=document.getElementById('import-class').value;
  showProgress();
  // Simple CSV parse
  const reader=new FileReader();
  reader.onload=function(e){
    const text=e.target.result;
    const lines=text.split('\n').filter(l=>l.trim());
    let count=0;
    lines.forEach((line,i)=>{
      if(i===0&&(line.toLowerCase().includes('nis')||line.toLowerCase().includes('nama')))return;
      const cols=line.split(/[,;\t]/);
      if(cols.length>=2){
        const nis=cols[0].trim();const name=cols[1].trim();
        if(nis&&name){
          APP.students[cls].push({id:`${cls}-imp-${Date.now()}-${i}`,name,nis});count++;
        }
      }
    });
    hideProgress();
    toast(`${count} siswa berhasil diimport ke kelas ${cls}`);
    addLog(`${APP.currentUser.name} import ${count} siswa ke kelas ${cls}`);
    renderView();
  };
  reader.readAsText(file);
}

function addStudentManual(){
  const nis=document.getElementById('add-nis').value.trim();
  const name=document.getElementById('add-name').value.trim();
  const cls=document.getElementById('add-class').value;
  if(!name){toast('Nama siswa harus diisi','error');return}
  APP.students[cls].push({id:`${cls}-m-${Date.now()}`,name,nis:nis||'-'});
  toast(`${name} ditambahkan ke kelas ${cls}`);
  addLog(`${APP.currentUser.name} menambah siswa ${name} ke kelas ${cls}`);
  document.getElementById('add-nis').value='';document.getElementById('add-name').value='';
}

function exportCardsExcel(cls){
  const students=APP.students[cls]||[];
  if(!students.length){toast('Belum ada siswa di kelas ini','error');return}
  
  showProgress();
  
  setTimeout(()=>{
    // Create CSV content with proper formatting for Excel
    let csv='No,NIS,Nama Siswa,Kelas,Tanggal Cetak,Catatan\n';
    const today=new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
    
    students.forEach((st,i)=>{
      csv+=`${i+1},"${st.nis}","${st.name}","${cls}","${today}","Gunakan untuk absensi harian siswa"\n`;
    });
    
    // Add extra lines for manual entry
    for(let i=students.length+1;i<=students.length+5;i++){
      csv+=`${i},"","","${cls}","${today}","(Kosongkan untuk siswa tambahan)"\n`;
    }
    
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const link=document.createElement('a');
    const url=URL.createObjectURL(blob);
    link.setAttribute('href',url);
    link.setAttribute('download',`kartu_absen_${cls}_${new Date().getTime()}.csv`);
    link.style.visibility='hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    
    hideProgress();
    toast('File Excel kartu absen berhasil diunduh!');
    addLog(`Admin export kartu absen kelas ${cls} ke Excel`);
  },600);
}

function saveTeacherEdit(id){
  const teacher=APP.teachers.find(t=>t.id===id);
  if(!teacher)return;
  const name=document.getElementById('e-name').value.trim();
  const username=document.getElementById('e-user').value.trim();
  const password=document.getElementById('e-pass').value.trim();
  const type=document.getElementById('e-type').value;
  if(!name||!username||!password){toast('Semua field harus diisi','error');return}
  teacher.name=name;teacher.username=username;teacher.password=password;teacher.type=type;
  if(type==='guru_kelas'){teacher.kelas=document.getElementById('e-kelas').value;delete teacher.mapel;}
  else{teacher.mapel=document.getElementById('e-mapel').value;delete teacher.kelas;}
  toast('Data guru berhasil diperbarui');addLog(`Admin edit guru: ${name}`);
  document.getElementById('edit-teacher-modal').style.display='none';renderView();
}

function deleteTeacher(id){

function importTeachers(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();reader.onload=function(e){
    const lines=e.target.result.split('\n').filter(l=>l.trim());let c=0;
    lines.forEach((line,i)=>{
      if(i===0&&line.toLowerCase().includes('username'))return;
      const cols=line.split(/[,;\t]/);
      if(cols.length>=4){
        const t={id:'t-imp-'+Date.now()+'-'+i,username:cols[0].trim(),password:cols[1].trim(),name:cols[2].trim(),type:cols[3].trim()};
        if(cols[4])t.type==='guru_kelas'?t.kelas=cols[4].trim():t.mapel=cols[4].trim();
        APP.teachers.push(t);c++;
      }
    });
    toast(`${c} guru berhasil diimport`);addLog(`Admin import ${c} guru`);renderView();
  };reader.readAsText(file);
}

function generateStudentProfileQR(cls){
  const studentId=document.getElementById('prof-student').value;
  const student=APP.students[cls].find(s=>s.id===studentId);
  if(!student){toast('Siswa tidak ditemukan','error');return}
  viewProfileQRModal(studentId,cls,student.name);
}

function viewProfileQRModal(studentId,cls,name){
  // Collect attendance data for this student
  let attendanceData=[];
  for(let d=0;d<90;d++){
    const date=new Date();date.setDate(date.getDate()-d);
    const dateStr=date.toISOString().split('T')[0];
    const k=getAttKey(cls,dateStr,studentId);
    const v=APP.attendance[k];
    if(v)attendanceData.push({date:dateStr,status:v});
  }
  
  let hadir=0,alfa=0,sakit=0,izin=0;
  attendanceData.forEach(a=>{
    if(a.status==='hadir')hadir++;
    else if(a.status==='alfa')alfa++;
    else if(a.status==='sakit')sakit++;
    else if(a.status==='izin')izin++;
  });
  
  // Create profile QR data (encoded as JSON string with student + attendance summary)
  const profileData={studentId,name,nis:APP.students[cls].find(s=>s.id===studentId)?.nis||'',kelas:cls,hadir,alfa,sakit,izin,totalAbsen:attendanceData.length};
  const qrContent=JSON.stringify(profileData);
  
  const modal=document.getElementById('profile-qr-modal');
  document.getElementById('pqr-name').textContent=name;
  document.getElementById('pqr-info').textContent=`NIS: ${profileData.nis} | Kelas: ${cls} | Periode: 90 hari terakhir`;
  document.getElementById('pqr-data').textContent=qrContent;
  
  const container=document.getElementById('pqr-container');
  container.innerHTML='';
  new QRCode(container,{text:qrContent,width:300,height:300,colorDark:'#2a8fff',colorLight:'#f0f4f8'});
  
  // Store current profile for download
  window.currentProfileQR={name,studentId,cls,data:profileData,qrContent};
  modal.style.display='flex';
}

function downloadProfileQR(){
  const canvas=document.querySelector('#pqr-container canvas');
  if(!canvas||!window.currentProfileQR)return;
  const link=document.createElement('a');
  link.href=canvas.toDataURL('image/png');
  link.download=`profil_${window.currentProfileQR.name.replace(/\s/g,'_')}_${window.currentProfileQR.studentId}.png`;
  link.click();
  toast('QR Profil berhasil diunduh!');
}

function downloadAllProfileQR(cls){
  const students=APP.students[cls]||[];
  if(!students.length){toast('Belum ada siswa di kelas ini','error');return}
  
  showProgress();
  toast(`Membuat ${students.length} QR Profile untuk kelas ${cls}...`);
  let count=0;
  
  students.forEach((st,i)=>{
    setTimeout(()=>{
      let totalHadir=0,totalAbsen=0;
      for(let d=0;d<90;d++){
        const date=new Date();date.setDate(date.getDate()-d);
        const dateStr=date.toISOString().split('T')[0];
        const k=getAttKey(cls,dateStr,st.id);
        const v=APP.attendance[k];
        if(v==='hadir')totalHadir++;
        else if(v)totalAbsen++;
      }
      
      const profileData={studentId:st.id,name:st.name,nis:st.nis,kelas:cls,hadir:totalHadir,alfa:0,sakit:0,izin:0,totalAbsen};
      const qrContent=JSON.stringify(profileData);
      
      const container=document.createElement('div');
      document.body.appendChild(container);
      new QRCode(container,{text:qrContent,width:200,height:200,colorDark:'#2a8fff',colorLight:'#f0f4f8'});
      
      setTimeout(()=>{
        const qrCanvas=container.querySelector('canvas');
        if(qrCanvas){
          const link=document.createElement('a');
          link.href=qrCanvas.toDataURL('image/png');
          link.download=`profil_${st.name.replace(/\s/g,'_')}_${st.nis}.png`;
          link.click();
        }
        document.body.removeChild(container);
        count++;
        if(count===students.length){
          hideProgress();
          toast(`${students.length} QR Profile berhasil diunduh!`);
        }
      },100);
    },i*500);
  });
  
  addLog(`Admin generate profile QR ${students.length} siswa kelas ${cls}`);
}

function addSubject(){const v=document.getElementById('new-subject').value.trim();if(!v)return;APP.subjects.push(v);toast(`Mapel ${v} ditambahkan`);addLog(`Admin menambah mapel: ${v}`);renderView()}
function deleteSubject(i){APP.subjects.splice(i,1);toast('Mapel dihapus');renderView()}
function importSubjects(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();reader.onload=function(e){
    const lines=e.target.result.split('\n').filter(l=>l.trim());let c=0;
    lines.forEach((line,i)=>{if(i===0&&line.toLowerCase().includes('nama'))return;const name=line.trim();if(name){APP.subjects.push(name);c++;}});
    toast(`${c} mapel diimport`);renderView();
  };reader.readAsText(file);
}

function renderAcademicCalendarView(el){
  const today=getToday();
  const currentMonth=APP.calendarMonth;
  const currentYear=APP.calendarYear;
  
  // Get holidays in current month
  const monthStart=new Date(currentYear,currentMonth,1);
  const monthEnd=new Date(currentYear,currentMonth+1,0);
  
  const holidaysThisMonth=APP.academicCalendar.filter(h=>{
    const hDate=new Date(h.date);
    return hDate>=monthStart && hDate<=monthEnd;
  });
  
  // Generate calendar grid
  const firstDay=monthStart.getDay();
  const daysInMonth=monthEnd.getDate();
  let calendarHTML='';
  
  const dayLabels=['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  calendarHTML+=`<tr style="background:var(--bg3)">`;
  dayLabels.forEach(d=>calendarHTML+=`<th style="padding:8px;text-align:center;font-size:12px;font-weight:700">${d}</th>`);
  calendarHTML+=`</tr><tr>`;
  
  for(let i=0;i<firstDay;i++)calendarHTML+=`<td style="background:var(--bg)"></td>`;
  
  for(let day=1;day<=daysInMonth;day++){
    const dateStr=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const holiday=APP.academicCalendar.find(h=>h.date===dateStr);
    const isToday=dateStr===today;
    const dayOfWeek=(firstDay+day-1)%7;
    
    let cellStyle='padding:12px;text-align:center;border:1px solid var(--border);height:60px;vertical-align:top;font-size:12px;';
    let dayHTML=`<div style="font-weight:700;margin-bottom:4px">${day}</div>`;
    
    if(holiday){
      const colors={libur_nasional:'#fecaca',libur_sekolah:'#fed7aa',cuti_bersama:'#dbeafe'};
      const textColors={libur_nasional:'#991b1b',libur_sekolah:'#92400e',cuti_bersama:'#1e40af'};
      cellStyle+=`background:${colors[holiday.type]||'#fee2e2'};color:${textColors[holiday.type]||'#991b1b'};font-weight:700`;
      dayHTML+=`<div style="font-size:10px;margin:2px 0">${holiday.type==='libur_nasional'?'🇮🇩':holiday.type==='libur_sekolah'?'🏫':'🎉'}</div>`;
      dayHTML+=`<div style="font-size:9px;line-height:1.2">${holiday.reason.slice(0,15)}</div>`;
    }else if(isToday){
      cellStyle+='background:#d1fae5;border:2px solid #10b981';
      dayHTML+=`<div style="font-size:9px;color:#065f46;font-weight:600">Hari Ini</div>`;
    }
    
    calendarHTML+=`<td style="${cellStyle}">${dayHTML}</td>`;
    
    if(dayOfWeek===6)calendarHTML+=`</tr><tr>`;
  }
  
  calendarHTML+=`</tr>`;
  
  el.innerHTML=`

      <div class="stat-card" style="background:linear-gradient(135deg,#fecaca,#fee2e2)">

        <div style="font-size:12px;color:#991b1b;font-weight:600">Libur Nasional</div>
      </div>
      <div class="stat-card" style="background:linear-gradient(135deg,#fed7aa,#fecab0)">
        <div style="font-size:28px;font-weight:800;color:#92400e">${APP.academicCalendar.filter(h=>h.type==='libur_sekolah').length}</div>

function addHoliday(){
  const date=document.getElementById('cal-date').value;
  const type=document.getElementById('cal-type').value;
  const reason=document.getElementById('cal-reason').value.trim();
  
  if(!date){toast('Tanggal harus diisi','error');return}
  if(!reason){toast('Alasan harus diisi','error');return}
  
  // Check if already exists
  if(APP.academicCalendar.find(h=>h.date===date)){
    toast('Tanggal ini sudah terdaftar','error');
    return;
  }
  
  APP.academicCalendar.push({date,type,reason});
  toast(`${reason} ditambahkan ke kalender akademik`);
  addLog(`Admin menambah libur: ${reason} (${date})`);
  
  document.getElementById('cal-date').value='';
  document.getElementById('cal-reason').value='';
  renderView();
}

function deleteHoliday(date){
  APP.academicCalendar=APP.academicCalendar.filter(h=>h.date!==date);
  toast('Hari libur dihapus');
  renderView();
}

function isHoliday(dateStr){
  return APP.academicCalendar.some(h=>h.date===dateStr);
}

function renderHomeVisitView(el){
  // Find all students with 3+ consecutive sick days (sakit)
  const today=getToday();
  let needsVisit=[];
  
  APP.classes.forEach(cls=>{
    (APP.students[cls]||[]).forEach(st=>{
      let consecutiveSick=0;
      let lastDate=null;
      
      // Check last 30 days
      for(let d=0;d<30;d++){
        const date=new Date();date.setDate(date.getDate()-d);
        const dateStr=date.toISOString().split('T')[0];
        const k=getAttKey(cls,dateStr,st.id);
        const v=APP.attendance[k];
        
        if(v==='sakit'){
          consecutiveSick++;
          if(!lastDate)lastDate=dateStr;
        }else{
          if(consecutiveSick>=3){
            needsVisit.push({
              studentId:st.id,className:cls,studentName:st.name,nis:st.nis,
              sickDays:consecutiveSick,lastSickDate:lastDate
            });
          }
          consecutiveSick=0;
          lastDate=null;
        }
      }
      
      if(consecutiveSick>=3){
        needsVisit.push({
          studentId:st.id,className:cls,studentName:st.name,nis:st.nis,

            <p style="color:var(--text2);font-size:11px;margin-bottom:6px">Catatan Kunjungan:</p>
            <textarea id="hv-notes" placeholder="Deskripsikan kondisi siswa, rekomendasi, dll..." rows="3" style="resize:vertical"></textarea>
          </div>
        </div>
        
        <div style="background:var(--bg);padding:12px;border-radius:8px;margin-bottom:16px">
          <p style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px">📸 Upload Bukti Foto</p>
          <p style="font-size:11px;color:var(--text2);margin-bottom:8px">Maksimal 5 foto, format: JPG/PNG, ukuran maks 2MB per foto</p>
          <input type="file" id="hv-file" accept="image/*" multiple style="padding:8px;border:1px dashed var(--border);border-radius:6px;width:100%;cursor:pointer;background:var(--bg2)">
          <div id="hv-preview" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:12px"></div>
        </div>
        
        <div class="flex gap-2 justify-end">
          <button class="btn btn-secondary" onclick="document.getElementById('home-visit-modal').style.display='none'">Batal</button>
          <button class="btn btn-success" onclick="submitHomeVisit()" id="hv-submit-btn"><i data-lucide="check" style="width:16px;height:16px"></i> Simpan Kunjungan</button>
        </div>
      </div>
    </div>
    
    <div id="evidence-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)this.style.display='none'">
      <div class="modal-content" style="max-width:700px">
        <h3 style="font-weight:700;font-size:18px;margin-bottom:16px">📸 Bukti Foto Home Visit</h3>
        <div id="evidence-gallery" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;max-height:500px;overflow-y:auto;padding:12px;background:var(--bg);border-radius:8px"></div>
        <button class="btn btn-secondary mt-4" onclick="document.getElementById('evidence-modal').style.display='none'" style="width:100%">Tutup</button>
      </div>
    </div>`;
  lucide.createIcons();
}

function openHomeVisitModal(studentId,className,studentName,nis){
  const modal=document.getElementById('home-visit-modal');
  document.getElementById('hv-name').textContent=studentName;
  document.getElementById('hv-info').textContent=`NIS: ${nis} | Kelas: ${className}`;
  
  // Store current student being edited
  window.currentHomeVisitStudent={studentId,className,studentName,nis};
  window.homeVisitImages=[];
  
  // Reset form
  document.getElementById('hv-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('hv-time').value=new Date().toTimeString().slice(0,5);
  document.getElementById('hv-notes').value='';
  document.getElementById('hv-preview').innerHTML='';
  
  // File input handler
  document.getElementById('hv-file').onchange=function(e){
    const files=Array.from(e.target.files);
    if(files.length>5){toast('Maksimal 5 foto','error');return}
    
    window.homeVisitImages=[];
    const preview=document.getElementById('hv-preview');preview.innerHTML='';
    
    files.forEach((file,i)=>{
      if(file.size>2*1024*1024){toast(`Foto ${i+1} terlalu besar (>2MB)`,'error');return}
      const reader=new FileReader();
      reader.onload=function(evt){
        window.homeVisitImages.push(evt.target.result);
        const img=document.createElement('img');
        img.src=evt.target.result;
        img.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid transparent';
        img.onclick=()=>img.style.border='2px solid #2a8fff';
        const div=document.createElement('div');
        div.style.cssText='position:relative;overflow:hidden;border-radius:6px';
        div.appendChild(img);
        preview.appendChild(div);
      };
      reader.readAsDataURL(file);
    });
  };
  
  modal.style.display='flex';
}

function submitHomeVisit(){
  const student=window.currentHomeVisitStudent;
  const date=document.getElementById('hv-date').value;
  const time=document.getElementById('hv-time').value;
  const notes=document.getElementById('hv-notes').value.trim();
  
  if(!date||!time){toast('Tanggal dan waktu harus diisi','error');return}
  if(!notes){toast('Catatan kunjungan harus diisi','error');return}
  
  const submitBtn=document.getElementById('hv-submit-btn');
  submitBtn.disabled=true;
  submitBtn.textContent='Menyimpan...';
  
  showProgress();
  
  setTimeout(()=>{
    if(!APP.homeVisits[student.studentId]){
      APP.homeVisits[student.studentId]={
        className:student.className,
        studentName:student.studentName,
        nis:student.nis,
        lastVisitDate:date,
        lastVisitTime:time,
        evidence:window.homeVisitImages||[]
      };
    }else{
      APP.homeVisits[student.studentId].lastVisitDate=date;
      APP.homeVisits[student.studentId].lastVisitTime=time;
      APP.homeVisits[student.studentId].notes=notes;
      APP.homeVisits[student.studentId].evidence=window.homeVisitImages||[];
    }
    
    hideProgress();
    submitBtn.disabled=false;
    submitBtn.textContent='✓ Simpan Kunjungan';
    
    toast(`Home visit ${student.studentName} berhasil disimpan!`);
    addLog(`Admin catat home visit untuk ${student.studentName} (${student.className})`);
    document.getElementById('home-visit-modal').style.display='none';
    renderView();
  },1000);
}

function viewHomeVisitEvidence(studentId){
  const visitData=APP.homeVisits[studentId];
  if(!visitData||!visitData.evidence||visitData.evidence.length===0){
    toast('Tidak ada bukti foto','error');
    return;
  }
  
  const gallery=document.getElementById('evidence-gallery');
  gallery.innerHTML='';
  
  visitData.evidence.forEach((img,i)=>{
    const div=document.createElement('div');
    div.style.cssText='border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid var(--border);transition:all .2s';
    div.innerHTML=`<img src="${img}" style="width:100%;height:100%;object-fit:cover" onclick="this.parentElement.style.borderColor='#2a8fff'">`;
    gallery.appendChild(div);
  });
  
  document.getElementById('evidence-modal').style.display='flex';
}

function saveSchoolName(){
  const v=document.getElementById('set-name').value.trim();if(!v)return;
  APP.schoolName=v;
  if(window.elementSdk)window.elementSdk.setConfig({school_name:v});
  toast('Nama sekolah diperbarui');addLog('Admin mengubah nama sekolah');render();
}

function saveSchoolLogo(){
  APP.schoolLogo=document.getElementById('set-logo').value.trim();
  toast('Logo diperbarui');addLog('Admin mengubah logo sekolah');render();
}

render();
